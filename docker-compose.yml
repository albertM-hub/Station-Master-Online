version: '3.8'

services:
  # ========== PostgreSQL Database ==========
  db:
    image: postgres:15-alpine
    container_name: smo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: station_master
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smo-network

  # ========== Node.js Backend ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smo-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: station_master
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - smo-network

  # ========== React Frontend (Vite) ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smo-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - smo-network

  # ========== Nginx Reverse Proxy (Optional) ==========
  nginx:
    image: nginx:alpine
    container_name: smo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - smo-network

networks:
  smo-network:
    driver: bridge

volumes:
  postgres_data:
